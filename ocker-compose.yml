version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: devops-db
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: studentdb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: devops-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: devops-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
